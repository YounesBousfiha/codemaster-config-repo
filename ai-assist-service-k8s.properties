spring.application.name=ai-assistant-service

server.port=8084

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY}
openai.api.url=https://api.openai.com/v1
openai.model=gpt-4

# AI Settings
ai.max.tokens=2000
ai.temperature=0.7
ai.timeout.seconds=30

# Database (for caching AI responses)
spring.datasource.url=jdbc:postgresql://postgres-service:5432/leetcode_ai
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.com.leetcode=INFO
logging.level.org.springframework.cloud=WARN

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# Kubernetes-specific (e.g., service discovery)
# spring.cloud.kubernetes.discovery.enabled=true

