spring.application.name=metrics-service

server.port=8085

# Database
spring.datasource.url=jdbc:postgresql://postgres-service:5432/leetcode_metrics
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Metrics Collection Settings
metrics.collection.interval.seconds=60
metrics.retention.days=90

# Logging
logging.level.com.leetcode=INFO
logging.level.org.springframework.cloud=WARN

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never
management.metrics.export.prometheus.enabled=true

# Kubernetes-specific (e.g., service discovery)
# spring.cloud.kubernetes.discovery.enabled=true

