spring.application.name=ai-assist-service

server.port=8084

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10

# DeepSeek Configuration (OpenAI-compatible API)
deepseek.api.key=${DEEPSEEK_API_KEY:}
deepseek.api.url=https://api.deepseek.com
deepseek.model=deepseek-chat

# Redis Configuration
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=6379

# Redis Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

# Rate Limiting Configuration
ai.rate-limit.requests-per-minute=10
ai.rate-limit.requests-per-hour=100

# OpenAPI / Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.show-actuator=false

# Logging
logging.level.com.leetcode=DEBUG
logging.level.org.springframework.cloud=INFO
logging.level.org.springframework.web.client=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
