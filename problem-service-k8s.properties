spring.application.name=problem-service

server.port=8086

# Database
spring.datasource.url=jdbc:postgresql://postgres-service:5432/leetcode_problems
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.com.leetcode=INFO
logging.level.org.springframework.cloud=WARN

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# Kubernetes-specific (e.g., service discovery)
# spring.cloud.kubernetes.discovery.enabled=true

